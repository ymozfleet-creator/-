<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySUPPORTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #060608; color: #ffffff; margin: 0; overflow-x: hidden; }
        .glass-panel { background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .campaign-card { transition: all 0.3s ease; }
        .campaign-card:hover { border-color: rgba(249, 115, 22, 0.5); transform: translateY(-4px); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const LegalModal = ({ title, content, isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6" onClick={onClose}>
                    <div className="bg-[#111] border border-white/10 w-full max-w-2xl max-h-[80vh] rounded-[2rem] overflow-hidden flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="p-8 border-b border-white/5 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-black italic text-orange-500 uppercase tracking-tighter">{title}</h2>
                            <button onClick={onClose} className="text-slate-500 hover:text-white font-black text-xs tracking-widest transition-colors">CLOSE</button>
                        </div>
                        <div className="p-8 overflow-y-auto text-sm text-slate-300 leading-relaxed font-medium space-y-4 no-scrollbar">{content}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('list');
            const [activeTab, setActiveTab] = useState('campaigns');
            const [adminSubTab, setAdminSubTab] = useState('management');
            const [isAdmin, setIsAdmin] = useState(false);
            const [selected, setSelected] = useState(null);
            
            const [amount, setAmount] = useState(1000);
            const [supporterName, setSupporterName] = useState("");
            const [supporterEmail, setSupporterEmail] = useState("");
            const [supportMessage, setSupportMessage] = useState("");
            const [isAgreed, setIsAgreed] = useState(false);

            const [campaigns, setCampaigns] = useState([
                { id: 1, team: "東京サッカーアカデミー", category: "サッカー", name: "公式試合球 10個セット", asin: "B00X9S5Y6Y", img: "https://thumbnail.image.rakuten.co.jp/@0_mall/sports-guide/cabinet/f5l5000-10.jpg", targetPrice: 58000, current: 32000, supporters: 12, daysLeft: 5, reason: "公式戦と同じ質のボールで練習環境を整え、都大会突破を目指したいからです。", status: "支援受付中" },
                { id: 2, team: "品川ライオンズ", category: "野球", name: "トレーニング用ミニハードル", asin: "B01DLYG66M", img: "https://images-na.ssl-images-amazon.com/images/P/B01DLYG66M.01.LZZZZZZZ.jpg", targetPrice: 9400, current: 2000, supporters: 3, daysLeft: 12, reason: "冬場の基礎体力作りとして、選手のアジリティを強化するために必要です。", status: "支援受付中" }
            ]);

            const reports = [
                { id: 1, team: "横浜バスケットクラブ", title: "タイマーが届きました！", text: "皆様のご支援により新しいタイマーを導入できました。これからの練習により熱が入ります！", date: "2026/01/15", image: "https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=800&q=80" }
            ];

            const [htmlSource, setHtmlSource] = useState("");
            const [itemBasePrice, setItemBasePrice] = useState("");
            const [formTeam, setFormTeam] = useState("マイチーム江原");
            const [formMessage, setFormMessage] = useState("");
            const [parsedData, setParsedData] = useState({ img: "", title: "", link: "" });
            const [modal, setModal] = useState({ open: false, title: '', content: null });
            const [loginForm, setLoginForm] = useState({ email: "", password: "" });

            const finalTargetPrice = useMemo(() => {
                const base = parseInt(itemBasePrice) || 0;
                return base === 0 ? 0 : Math.ceil((base + 500) * 1.1);
            }, [itemBasePrice]);

            useEffect(() => {
                if (!htmlSource) return;
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlSource, 'text/html');
                const imgTag = doc.querySelector('img');
                const aTag = doc.querySelector('a');
                let detectedPrice = "";
                const priceMatch = htmlSource.match(/([0-9,]{1,10})円/) || doc.body.textContent.match(/([0-9,]{1,10})/);
                if (priceMatch) detectedPrice = priceMatch[1].replace(/,/g, "");
                setParsedData({
                    img: imgTag ? imgTag.getAttribute('src') : "",
                    link: aTag ? aTag.getAttribute('href') : "",
                    title: aTag ? aTag.textContent.trim() : "商品名なし"
                });
                if(detectedPrice) setItemBasePrice(detectedPrice);
            }, [htmlSource]);

            const handlePublish = () => {
                if (!parsedData.img || !finalTargetPrice || !formMessage || !parsedData.title) {
                    alert("解析エラーまたは未入力項目があります。"); return;
                }
                const newCampaign = {
                    id: Date.now(),
                    team: formTeam,
                    category: "その他",
                    name: parsedData.title,
                    img: parsedData.img,
                    targetPrice: finalTargetPrice,
                    current: 0,
                    supporters: 0,
                    daysLeft: 30,
                    reason: formMessage,
                    status: "支援受付中"
                };
                setCampaigns(prev => [newCampaign, ...prev]);
                alert("正常に反映されました！");
                setAdminSubTab('management');
            };

            const handleAdminLogin = () => {
                if (loginForm.email === "y.moz.fleet@gmail.com" && loginForm.password === "Rushers1#") {
                    setIsAdmin(true); setView('admin');
                } else { alert("認証失敗"); }
            };

            const handleStripePayment = () => {
                if (!supporterEmail || !supporterName || !isAgreed) {
                    alert("名前、メールアドレスの入力と規約への同意が必要です。");
                    return;
                }
                alert(`${amount}円の支援手続きを開始します。Stripe決済ページへ移動します。`);
            };

            const docContent = {
                terms: (<div className="space-y-4"><p className="font-bold text-white uppercase italic">第1条（目的）</p><p>本規約は、MySUPPORTER（以下「当サービス」）の利用条件を定めるものです。</p></div>),
                privacy: (<div className="space-y-4"><p className="font-bold text-white uppercase italic">1. 取得する情報</p><p>支援時にメールアドレス等を取得し、決済管理に使用します。</p></div>),
                tokusho: (<div className="space-y-4"><p>販売業者: MySUPPORTER 運営事務局</p><p>所在地: 東京都中野区江原町2-13-13</p></div>)
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="h-20 flex items-center justify-between px-6 md:px-10 sticky top-0 bg-[#060608]/95 backdrop-blur-xl z-50 border-b border-white/5">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('list'); setActiveTab('campaigns');}}>
                            <div className="bg-orange-600 w-8 h-8 rounded-lg flex items-center justify-center italic font-black text-white">S</div>
                            <span className="font-black text-xl tracking-tighter uppercase italic text-white hidden sm:block">MySUPPORTER</span>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-full border border-white/10">
                            {['campaigns', 'howitworks', 'thanks'].map(tab => (
                                <button key={tab} onClick={() => {setView('list'); setActiveTab(tab);}} className={`px-5 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${activeTab === tab && view === 'list' ? 'bg-orange-600 text-white' : 'text-slate-400 hover:text-white'}`}>
                                    {tab === 'campaigns' ? '支援募集' : tab === 'howitworks' ? 'フロー' : '活動報告'}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 py-10 w-full flex-grow">
                        {view === 'list' && activeTab === 'campaigns' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 fade-in">
                                {campaigns.map(c => (
                                    <div key={c.id} className="campaign-card glass-panel rounded-[2rem] overflow-hidden cursor-pointer flex flex-col" onClick={() => {setSelected(c); setView('detail'); setAmount(1000);}}>
                                        <div className="aspect-square bg-white m-4 rounded-2xl p-6 flex items-center justify-center relative">
                                            <img src={c.img} className="max-h-full object-contain" />
                                            <div className="absolute top-3 right-3 bg-black px-2 py-1 rounded text-[8px] font-black text-orange-500 italic uppercase">残り{c.daysLeft}日</div>
                                        </div>
                                        <div className="px-6 pb-6 space-y-3">
                                            <p className="text-[10px] font-black italic text-orange-500 uppercase tracking-widest">{c.team}</p>
                                            <h3 className="text-sm font-black italic uppercase line-clamp-2 h-10">{c.name}</h3>
                                            <p className="text-[10px] text-slate-400 font-bold italic line-clamp-2 leading-relaxed">“{c.reason}”</p>
                                            <div className="pt-4 border-t border-white/5">
                                                <div className="flex justify-between items-end mb-2 italic">
                                                    <span className="text-xl font-black">¥{c.current.toLocaleString()}</span>
                                                    <span className="text-[9px] font-black text-slate-500">GOAL: ¥{c.targetPrice.toLocaleString()}</span>
                                                </div>
                                                <div className="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                                                    <div className="h-full bg-orange-600" style={{width: `${(c.current/c.targetPrice)*100}%`}}></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'list' && activeTab === 'howitworks' && (
                            <div className="max-w-3xl mx-auto py-10 fade-in">
                                <h2 className="text-4xl font-black italic uppercase mb-16 tracking-tighter border-b border-white/10 pb-6 text-orange-500">ご利用フロー</h2>
                                <div className="space-y-0 relative">
                                    <div className="absolute left-[27px] top-0 bottom-0 w-[2px] bg-orange-600/30"></div>
                                    {[
                                        { step: "01", title: "支援募集を探す", desc: "チームが切実に必要としているスポーツ用品の募集から、応援したいものを選びます。" },
                                        { step: "02", title: "決済完了", desc: "メールアドレスを入力し、Stripeによる安全な決済で支援金を送ります。" },
                                        { step: "03", title: "商品がチームに届く", desc: "目標金額に達すると、運営がAmazon等で購入し、直接チームへ発送されます。" },
                                        { step: "04", title: "活動報告の受け取り", desc: "商品到着後、チームからの感謝のメッセージと写真が掲載されます。" }
                                    ].map((item, idx) => (
                                        <div key={idx} className="flex gap-10 pb-16 relative">
                                            <div className="w-14 h-14 rounded-full bg-orange-600 flex items-center justify-center shrink-0 z-10 font-black italic text-white text-xl shadow-[0_0_20px_rgba(249,115,22,0.4)]">{item.step}</div>
                                            <div>
                                                <h3 className="text-2xl font-black italic uppercase tracking-tighter mb-2">{item.title}</h3>
                                                <p className="text-slate-400 font-bold">{item.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'list' && activeTab === 'thanks' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                                {reports.map(rep => (
                                    <div key={rep.id} className="glass-panel rounded-3xl overflow-hidden flex flex-col md:flex-row">
                                        <div className="md:w-1/3 aspect-video md:aspect-square shrink-0"><img src={rep.image} className="w-full h-full object-cover" /></div>
                                        <div className="p-6 space-y-3 flex-1">
                                            <p className="text-[10px] font-black italic text-orange-500 uppercase tracking-widest">{rep.team}</p>
                                            <h3 className="text-xl font-black italic tracking-tighter uppercase">{rep.title}</h3>
                                            <p className="text-slate-400 text-xs font-bold leading-relaxed italic">"{rep.text}"</p>
                                            <p className="text-[9px] text-slate-600 font-black uppercase pt-2">{rep.date} UPDATE</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'detail' && selected && (
                            <div className="max-w-5xl mx-auto fade-in">
                                <button onClick={() => setView('list')} className="text-slate-600 font-black text-[10px] uppercase mb-8 hover:text-white transition">← BACK</button>
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-7 space-y-8">
                                        <p className="text-4xl font-black italic text-orange-500 uppercase leading-none">{selected.team}</p>
                                        <div className="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] relative">
                                            <div className="absolute -top-3 left-8 bg-orange-600 px-4 py-1 rounded-full text-[9px] font-black uppercase italic">Reason / チームの想い</div>
                                            <p className="text-lg font-bold italic text-slate-200">“{selected.reason}”</p>
                                        </div>
                                        <div className="bg-white rounded-[2.5rem] p-12 aspect-square flex items-center justify-center">
                                            <img src={selected.img} className="max-h-full" />
                                        </div>
                                    </div>
                                    <div className="lg:col-span-5 space-y-8 h-fit sticky top-28">
                                        <div className="glass-panel p-8 rounded-[2.5rem] border-t-8 border-orange-600 space-y-6">
                                            <h2 className="text-2xl font-black italic uppercase tracking-tighter">{selected.name}</h2>
                                            <div><p className="text-[10px] font-black text-slate-500 uppercase mb-2">現在の支援額</p><p className="text-6xl font-black italic tracking-tighter">¥{selected.current.toLocaleString()}</p></div>
                                            
                                            <div className="grid grid-cols-3 gap-2">
                                                {[1000, 3000, 5000].map(val => (
                                                    <button key={val} onClick={() => setAmount(val)} className={`py-4 rounded-xl font-black text-xs border transition-all ${amount === val ? 'bg-orange-600 border-orange-600 text-white' : 'bg-white/5 border-white/10 text-slate-500'}`}>¥{val.toLocaleString()}</button>
                                                ))}
                                                <button onClick={() => setAmount(selected.targetPrice)} className={`py-4 rounded-xl font-black text-[9px] border transition-all ${amount === selected.targetPrice ? 'bg-orange-600 border-orange-600 text-white' : 'bg-white/5 border-white/10 text-slate-500'}`}>全額支援</button>
                                                <button onClick={() => setAmount(Math.max(0, selected.targetPrice - selected.current))} className={`py-4 rounded-xl font-black text-[9px] border transition-all ${amount === (selected.targetPrice - selected.current) ? 'bg-orange-600 border-orange-600 text-white' : 'bg-white/5 border-white/10 text-slate-500'}`}>残りを支援</button>
                                            </div>

                                            <div className="pt-6 border-t border-white/5 space-y-4">
                                                <input type="text" placeholder="お名前（ニックネーム）" value={supporterName} onChange={e => setSupporterName(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-sm font-bold outline-none focus:border-orange-500" />
                                                <input type="email" placeholder="メールアドレス" value={supporterEmail} onChange={e => setSupporterEmail(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-sm font-bold outline-none focus:border-orange-500" />
                                                <textarea placeholder="応援メッセージ（任意）" value={supportMessage} onChange={e => setSupportMessage(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-sm font-bold h-24 outline-none focus:border-orange-500" />
                                                
                                                <label className="flex items-center gap-3 cursor-pointer group">
                                                    <input type="checkbox" checked={isAgreed} onChange={e => setIsAgreed(e.target.checked)} className="w-5 h-5 accent-orange-600" />
                                                    <span className="text-[10px] font-bold text-slate-500 group-hover:text-slate-300 transition-colors">
                                                        <span onClick={(e) => {e.preventDefault(); setModal({open:true, title:'利用規約', content:docContent.terms})}} className="underline">利用規約</span> と <span onClick={(e) => {e.preventDefault(); setModal({open:true, title:'プライバシーポリシー', content:docContent.privacy})}} className="underline">プライバシーポリシー</span> に同意する
                                                    </span>
                                                </label>

                                                <button onClick={handleStripePayment} disabled={!isAgreed} className={`w-full py-5 rounded-2xl font-black text-xl uppercase italic transition-all ${isAgreed ? 'bg-orange-600 text-white shadow-lg shadow-orange-600/20 hover:bg-orange-500' : 'bg-white/10 text-slate-700 cursor-not-allowed'}`}>Pay ¥{amount.toLocaleString()} with Stripe</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'login' && (
                            <div className="max-w-sm mx-auto py-20 fade-in">
                                <div className="glass-panel p-10 rounded-[2.5rem] border-t-8 border-orange-600 space-y-6">
                                    <h2 className="text-2xl font-black italic text-center uppercase">Admin Login</h2>
                                    <input type="email" placeholder="Email" value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 font-bold outline-none" />
                                    <input type="password" placeholder="Password" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 font-bold outline-none" />
                                    <button onClick={handleAdminLogin} className="w-full py-4 bg-orange-600 rounded-xl font-black italic uppercase tracking-widest hover:bg-orange-500 transition-colors">Login</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && isAdmin && (
                            <div className="fade-in space-y-10">
                                <div className="flex justify-between items-end border-b border-white/10 pb-6">
                                    <div>
                                        <p className="text-orange-500 font-black italic text-[10px] uppercase">Management Console</p>
                                        <h2 className="text-4xl font-black italic uppercase tracking-tighter">Admin Dashboard</h2>
                                    </div>
                                    <div className="flex gap-2 bg-white/5 p-1 rounded-xl">
                                        <button onClick={() => setAdminSubTab('management')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${adminSubTab === 'management' ? 'bg-orange-600' : ''}`}>案件管理</button>
                                        <button onClick={() => setAdminSubTab('registration')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${adminSubTab === 'registration' ? 'bg-orange-600' : ''}`}>事務局登録</button>
                                    </div>
                                </div>

                                {adminSubTab === 'management' ? (
                                    <div className="glass-panel rounded-[2rem] overflow-hidden">
                                        <table className="w-full text-left text-xs">
                                            <thead className="bg-white/5 text-[9px] font-black uppercase text-slate-500">
                                                <tr><th className="p-5">チーム/商品名</th><th className="p-5">進捗</th><th className="p-5">ステータス</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {campaigns.map(item => (
                                                    <tr key={item.id} className="hover:bg-white/5 transition-colors">
                                                        <td className="p-5"><p className="text-orange-500 font-black text-[10px] uppercase">{item.team}</p><p className="font-bold">{item.name}</p></td>
                                                        <td className="p-5">
                                                            <p className="font-black italic mb-1">¥{item.current.toLocaleString()} / ¥{item.targetPrice.toLocaleString()}</p>
                                                            <div className="w-48 h-1 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-orange-600" style={{width:`${(item.current/item.targetPrice)*100}%`}}></div></div>
                                                        </td>
                                                        <td className="p-5"><span className="bg-white/10 px-2 py-1 rounded text-[9px] font-black uppercase">{item.status}</span></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <div className="glass-panel p-8 rounded-[2.5rem] space-y-6">
                                            <div className="space-y-4">
                                                <label className="text-[10px] font-black text-slate-500 uppercase italic block">1. 楽天ソースコード</label>
                                                <textarea className="w-full h-32 bg-white/5 border border-white/10 rounded-2xl p-4 text-[10px] font-mono outline-none focus:border-orange-500" value={htmlSource} onChange={(e)=>setHtmlSource(e.target.value)} placeholder="<table..."/>
                                                
                                                <label className="text-[10px] font-black text-orange-500 uppercase italic block">2. 商品名称</label>
                                                <input className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm font-bold outline-none focus:border-orange-500" value={parsedData.title} onChange={(e)=>setParsedData({...parsedData, title: e.target.value})} placeholder="掲載される商品名を入力"/>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-500 uppercase italic block">3. チーム名</label>
                                                        <input className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs font-bold" value={formTeam} onChange={(e)=>setFormTeam(e.target.value)}/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-500 uppercase italic block">4. 楽天価格</label>
                                                        <input className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm font-black text-orange-500" type="number" value={itemBasePrice} onChange={(e)=>setItemBasePrice(e.target.value)}/>
                                                    </div>
                                                </div>
                                                <label className="text-[10px] font-black text-orange-500 uppercase italic block">5. 表示したい理由</label>
                                                <textarea className="w-full h-24 bg-orange-600/5 border border-orange-600/20 rounded-2xl p-4 text-xs font-bold outline-none" value={formMessage} onChange={(e)=>setFormMessage(e.target.value)} placeholder="サポーターへの想い..."/>
                                                <div className="flex justify-between items-center bg-black p-5 rounded-2xl border border-white/5">
                                                    <span className="text-[10px] font-black text-slate-500 uppercase">Goal Price</span>
                                                    <span className="text-2xl font-black text-orange-500 italic">¥{finalTargetPrice.toLocaleString()}</span>
                                                </div>
                                                <button onClick={handlePublish} className="w-full py-5 bg-orange-600 rounded-2xl font-black text-xl italic uppercase">掲載を実行する</button>
                                            </div>
                                        </div>
                                        <div className="hidden lg:block space-y-4">
                                            <p className="text-center text-[10px] font-black text-slate-600 uppercase italic">Preview</p>
                                            {parsedData.img && (
                                                <div className="glass-panel rounded-[2.5rem] p-8 border border-white/10">
                                                    <div className="aspect-square bg-white rounded-2xl p-6 flex items-center justify-center mb-6"><img src={parsedData.img} className="max-h-full object-contain" /></div>
                                                    <h4 className="text-xl font-black italic uppercase line-clamp-2">{parsedData.title}</h4>
                                                    <p className="text-xs text-slate-400 italic mt-4">"{formMessage}"</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-black/50 border-t border-white/5 py-12 px-6">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-[9px] font-black uppercase tracking-widest">
                            <p className="opacity-30">© 2026 MySUPPORTER.</p>
                            <div className="flex gap-8">
                                <button onClick={() => setModal({open: true, title: '利用規約', content: docContent.terms})} className="text-slate-600 hover:text-orange-500">利用規約</button>
                                <button onClick={() => setModal({open: true, title: 'プライバシー', content: docContent.privacy})} className="text-slate-600 hover:text-orange-500">プライバシー</button>
                                <button onClick={() => setModal({open: true, title: '特定商取引', content: docContent.tokusho})} className="text-slate-600 hover:text-orange-500">特定商取引</button>
                            </div>
                            <button onClick={() => setView('login')} className="text-slate-800 hover:text-orange-500/50">Admin</button>
                        </div>
                    </footer>
                    <LegalModal isOpen={modal.open} title={modal.title} content={modal.content} onClose={() => setModal({open: false})} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
